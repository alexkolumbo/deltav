<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ΔV">
<link rel="manifest" href="/manifest.webmanifest">
<title>ΔV Chat</title>
<style>
  :root { --bg:#0b0d10; --panel:#14181d; --line:#232a32; --fg:#e6edf3; --dim:#8b98a5;
          --accent:#ff7a1a; --ok:#3fb950; --user:#1c2733; --bad:#f85149; }
  * { box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { background:var(--bg); color:var(--fg);
         font:16px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; display:flex; flex-direction:column; }
  header { display:flex; gap:6px; align-items:center; padding:10px 12px; background:var(--panel);
           border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header .logo { color:var(--accent); font-weight:700; letter-spacing:.04em; }
  select, .iconbtn { background:var(--bg); color:var(--fg); border:1px solid var(--line);
                     border-radius:8px; padding:7px 9px; font-size:13px; }
  #model { flex:1; min-width:0; }
  .iconbtn { color:var(--dim); cursor:pointer; }
  #status { width:9px; height:9px; border-radius:50%; background:var(--dim); flex:none; }
  #status.ok { background:var(--ok); } #status.bad { background:var(--bad); }
  #modes { display:flex; gap:4px; padding:6px 12px; background:var(--panel);
           border-bottom:1px solid var(--line); overflow-x:auto; }
  .mode { border:1px solid var(--line); border-radius:20px; padding:5px 14px; font-size:13px;
          color:var(--dim); white-space:nowrap; cursor:pointer; }
  .mode.on { color:#000; background:var(--accent); border-color:var(--accent); font-weight:600; }
  main { flex:1; overflow-y:auto; padding:14px 12px 8px; -webkit-overflow-scrolling:touch; }
  .msg { max-width:92%; margin-bottom:10px; padding:10px 13px; border-radius:14px;
         white-space:pre-wrap; word-wrap:break-word; }
  .msg.user { background:var(--user); margin-left:auto; border-bottom-right-radius:4px; }
  .msg.bot { background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .msg.bot.pending::after { content:"▍"; color:var(--accent); animation:blink 1s infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .msg img { max-width:180px; border-radius:8px; margin-top:6px; display:block; }
  .meta { font-size:11px; color:var(--dim); margin:-4px 0 12px 4px; }
  .step { font-size:12px; color:var(--dim); border-left:2px solid var(--accent); padding:2px 8px; margin:4px 0 4px 4px; }
  footer { padding:8px 12px calc(8px + env(safe-area-inset-bottom)); background:var(--panel);
           border-top:1px solid var(--line); position:sticky; bottom:0; }
  #thumb { display:none; margin-bottom:6px; }
  #thumb img { max-height:56px; border-radius:8px; border:1px solid var(--line); }
  #thumb button { margin-left:8px; }
  .row { display:flex; gap:8px; }
  textarea { flex:1; resize:none; background:var(--bg); color:var(--fg); border:1px solid var(--line);
             border-radius:12px; padding:10px 12px; font:16px/1.4 inherit; max-height:120px; }
  #send { background:var(--accent); color:#000; border:none; border-radius:12px; padding:0 18px; font-size:15px; font-weight:600; }
  #send:disabled { opacity:.4; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center;
           justify-content:center; z-index:20; padding:16px; }
  .modal.on { display:flex; }
  .sheet { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px;
           width:100%; max-width:420px; }
  .sheet h3 { margin-bottom:12px; font-size:15px; }
  .sheet label { display:block; font-size:12px; color:var(--dim); margin:10px 0 4px; }
  .sheet input { width:100%; background:var(--bg); color:var(--fg); border:1px solid var(--line);
                 border-radius:8px; padding:9px 10px; font-size:14px; }
  .sheet .actions { display:flex; gap:8px; margin-top:16px; }
  .sheet button { flex:1; border-radius:8px; padding:10px; font-size:14px; border:1px solid var(--line);
                  background:var(--bg); color:var(--fg); }
  .sheet button.primary { background:var(--accent); color:#000; border:none; font-weight:600; }
  .sheet.wide { max-width:480px; max-height:88vh; overflow-y:auto; }
  .acc-sec { border-top:1px solid var(--line); padding-top:12px; margin-top:12px; }
  .acc-sec:first-of-type { border-top:none; padding-top:0; margin-top:0; }
  .copyrow { display:flex; gap:8px; align-items:center; margin-top:4px; }
  .copyrow code { flex:1; min-width:0; background:var(--bg); border:1px solid var(--line);
                  border-radius:8px; padding:8px 10px; font-size:12px; overflow-x:auto; white-space:nowrap; }
  .copy { border:1px solid var(--line); background:var(--bg); color:var(--dim); border-radius:8px;
          padding:8px 11px; font-size:12px; cursor:pointer; white-space:nowrap; flex:none; }
  .copy.done { color:var(--ok); border-color:var(--ok); }
  .dimnote { font-size:12px; color:var(--dim); margin-top:8px; line-height:1.5; }
  .snippet { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px;
             font-size:11px; overflow-x:auto; white-space:pre; margin-top:4px; color:var(--fg); }
  .kv { display:flex; justify-content:space-between; gap:10px; font-size:13px; padding:4px 0; color:var(--dim); }
  .kv b { color:var(--fg); font-weight:600; word-break:break-all; text-align:right; }
</style>
</head>
<body>
<header>
  <span class="logo">&Delta;V</span>
  <span id="status" title="network"></span>
  <select id="model"><option value="auto">auto</option></select>
  <button class="iconbtn" id="acct" title="подключение и кабинет">🔑</button>
  <button class="iconbtn" id="gear" title="настройки">⚙</button>
  <button class="iconbtn" id="reset" title="новый диалог">↺</button>
</header>
<div id="modes">
  <div class="mode on" data-mode="chat">💬 Чат</div>
  <div class="mode" data-mode="agent">🛠 Агент</div>
  <div class="mode" data-mode="swarm">🐝 Сворм</div>
  <div class="mode" data-mode="companion">🧠 Компаньон</div>
</div>
<main id="log"></main>
<footer>
  <div id="thumb"><img id="thumbimg"><button class="iconbtn" id="thumbx">✕</button></div>
  <div class="row">
    <button class="iconbtn" id="attach" title="изображение">🖼</button>
    <textarea id="input" rows="1" placeholder="Сообщение…" enterkeyhint="send"></textarea>
    <button id="send">➤</button>
  </div>
  <input type="file" id="file" accept="image/*" hidden>
</footer>

<div class="modal" id="account">
  <div class="sheet wide">
    <h3>🔑 Подключение и кабинет</h3>
    <div class="acc-sec">
      <label>Base URL (OpenAI-совместимый)</label>
      <div class="copyrow"><code id="a-base"></code><button class="copy" data-copy="a-base">Копировать</button></div>
      <label>ID модели</label>
      <div class="copyrow"><code id="a-model"></code><button class="copy" data-copy="a-model">Копировать</button></div>
    </div>
    <div class="acc-sec">
      <label>API-ключ</label>
      <div class="copyrow"><code id="a-key">—</code><button class="copy" data-copy="a-key">Копировать</button></div>
      <button id="a-newkey" style="width:100%;margin-top:10px">Создать новый API-ключ</button>
      <div id="a-keynote" class="dimnote"></div>
    </div>
    <div class="acc-sec">
      <label>Личный кабинет</label>
      <div id="a-account" class="dimnote">Создайте или вставьте dvk_-ключ, чтобы увидеть баланс и расход.</div>
    </div>
    <div class="acc-sec">
      <label>Пример запроса</label>
      <pre id="a-curl" class="snippet"></pre>
      <button class="copy" data-copy="a-curl" style="width:100%;margin-top:8px">Копировать curl</button>
    </div>
    <div class="actions"><button class="primary" id="a-close">Готово</button></div>
  </div>
</div>

<div class="modal" id="settings">
  <div class="sheet">
    <h3>Подключение к сети</h3>
    <label>Gateway URL (через запятую для нескольких)</label>
    <input id="s-url" placeholder="http://10.0.0.223:9000">
    <label>API-ключ (dvk_… или любой)</label>
    <input id="s-key" placeholder="deltav">
    <div class="actions">
      <button id="s-cancel">Отмена</button>
      <button class="primary" id="s-save">Сохранить</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const log = $("log"), input = $("input"), sendBtn = $("send");
let messages = [], busy = false, mode = "chat", pendingImage = null;
// API base = where THIS page is mounted, minus the trailing /chat. Served at
// http://host:9000/chat  -> base http://host:9000. Served through the relay at
// http://relay:9200/via/<gw>/chat -> base http://relay:9200/via/<gw> (NOT
// location.origin, which drops the /via/<gw> prefix and hits the relay root=404).
const apiBase = () => (location.origin + location.pathname).replace(/\/chat\/?$/, "");
const CFG = {
  base: localStorage.dvBase || apiBase(),
  key: localStorage.dvKey || "deltav",
  session: localStorage.dvSession || (localStorage.dvSession = "web-" + Math.random().toString(36).slice(2, 10)),
};
if (location.hash.startsWith("#key=")) { CFG.key = localStorage.dvKey = location.hash.slice(5); history.replaceState(null, "", location.pathname); }
const H = () => ({ "Content-Type": "application/json", "Authorization": "Bearer " + CFG.key });

function el(cls, text) { const d = document.createElement("div"); d.className = cls; if (text) d.textContent = text; log.appendChild(d); log.scrollTop = log.scrollHeight; return d; }

async function loadModels() {
  try {
    const data = await (await fetch(CFG.base + "/v1/models", { headers: H() })).json();
    $("status").className = "ok"; $("model").innerHTML = '<option value="auto">auto</option>';
    for (const m of data.data) {
      if (!m.deltav.served_by.length || m.deltav.kind !== "chat") continue;
      const o = document.createElement("option"); o.value = m.id;
      o.textContent = m.id.split("::")[0].split("/").pop() + (m.deltav.vision ? " 👁" : "");
      $("model").appendChild(o);
    }
  } catch { $("status").className = "bad"; }
}

async function sendChat(text) {
  const content = pendingImage
    ? [{ type: "text", text }, { type: "image_url", image_url: { url: pendingImage } }]
    : text;
  messages.push({ role: "user", content });
  const bubble = el("msg bot pending", ""); let acc = "", meta = null;
  const stream = !pendingImage;   // vision goes non-stream
  const resp = await fetch(CFG.base + "/v1/chat/completions", {
    method: "POST", headers: H(),
    body: JSON.stringify({ model: $("model").value, messages, stream, max_tokens: 1024 }),
  });
  if (!resp.ok) { bubble.className = "msg bot"; bubble.textContent = "⚠ " + resp.status; messages.pop(); return; }
  if (stream) {
    const reader = resp.body.getReader(), dec = new TextDecoder(); let buf = "";
    while (true) { const { done, value } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream: true }); const lines = buf.split("\n"); buf = lines.pop();
      for (const line of lines) { if (!line.startsWith("data: ") || line === "data: [DONE]") continue;
        const c = JSON.parse(line.slice(6)); const d = c.choices?.[0]?.delta?.content;
        if (d) { acc += d; bubble.textContent = acc; log.scrollTop = log.scrollHeight; }
        if (c.usage) meta = c; } }
  } else { const d = await resp.json(); acc = d.choices[0].message.content; bubble.textContent = acc; meta = d; }
  bubble.className = "msg bot"; messages.push({ role: "assistant", content: acc });
  if (meta) el("meta", `${(meta.model||"").split("::")[0].split("/").pop()} · нода ${String(meta.deltav?.node||"").slice(0,10)} · чек ${String(meta.deltav?.receipt_tx||"").slice(0,8)}`);
}

async function sendPost(path, body, label) {
  const bubble = el("msg bot pending", label);
  const resp = await fetch(CFG.base + path, { method: "POST", headers: H(), body: JSON.stringify(body) });
  const d = await resp.json(); bubble.remove();
  if (!resp.ok) { el("msg bot", "⚠ " + (d.detail || resp.status)); return null; }
  return d;
}

async function onSend() {
  const text = input.value.trim(); if ((!text && !pendingImage) || busy) return;
  input.value = ""; input.style.height = "auto";
  const u = el("msg user", text); if (pendingImage) { const im = document.createElement("img"); im.src = pendingImage; u.appendChild(im); }
  busy = true; sendBtn.disabled = true;
  try {
    if (mode === "chat" || pendingImage) await sendChat(text);
    else if (mode === "agent") { const d = await sendPost("/v1/agents/run", { task: text, model: $("model").value, max_steps: 6, session_id: CFG.session }, "агент думает…");
      if (d) { for (const s of d.steps||[]) el("step", `🛠 ${s.tool}(${JSON.stringify(s.arguments)})`); el("msg bot", d.answer); } }
    else if (mode === "swarm") { const d = await sendPost("/v1/swarm", { task: text, n: 3, mode: "vote", max_tokens: 300 }, "сворм работает…");
      if (d) { for (const w of d.workers) el("step", `[${w.model}] ${(w.answer||w.error||"").slice(0,80)}`); if (d.answer) el("msg bot", d.answer); } }
    else if (mode === "companion") { const d = await sendPost("/v1/companion/chat", { message: text, model: $("model").value }, "…");
      if (d) { for (const s of d.steps||[]) el("step", `🛠 ${s.tool}`); el("msg bot", d.answer); if (d.learned) el("meta", "💡 запомнил: " + d.learned); } }
  } catch (e) { el("msg bot", "⚠ " + e.message); }
  pendingImage = null; $("thumb").style.display = "none";
  busy = false; sendBtn.disabled = false;
}

// image attach
$("attach").onclick = () => $("file").click();
$("file").onchange = e => { const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = () => { pendingImage = r.result; $("thumbimg").src = r.result; $("thumb").style.display = "flex"; }; r.readAsDataURL(f); };
$("thumbx").onclick = () => { pendingImage = null; $("thumb").style.display = "none"; };

// modes
document.querySelectorAll(".mode").forEach(m => m.onclick = () => {
  document.querySelectorAll(".mode").forEach(x => x.classList.remove("on"));
  m.classList.add("on"); mode = m.dataset.mode;
  input.placeholder = { chat: "Сообщение…", agent: "Задача для агента…", swarm: "Задача для сворма…", companion: "Компаньон помнит вас…" }[mode];
});

// settings
$("gear").onclick = () => { $("s-url").value = CFG.base; $("s-key").value = CFG.key; $("settings").classList.add("on"); };
$("s-cancel").onclick = () => $("settings").classList.remove("on");
$("s-save").onclick = () => { CFG.base = localStorage.dvBase = $("s-url").value.trim() || apiBase();
  CFG.key = localStorage.dvKey = $("s-key").value.trim() || "deltav"; $("settings").classList.remove("on"); loadModels(); };

// ---- Connect & personal cabinet ----
document.addEventListener("click", e => {
  const b = e.target.closest(".copy"); if (!b) return;
  const txt = $(b.dataset.copy).textContent; if (!txt || txt === "—") return;
  navigator.clipboard.writeText(txt).then(() => {
    const old = b.textContent; b.classList.add("done"); b.textContent = "✓ Скопировано";
    setTimeout(() => { b.classList.remove("done"); b.textContent = old; }, 1200);
  });
});
function openAccount() {
  const model = $("model").value || "auto";
  $("a-base").textContent = CFG.base;
  $("a-model").textContent = model;
  $("a-key").textContent = (CFG.key && CFG.key.startsWith("dvk_")) ? CFG.key : "—";
  $("a-curl").textContent =
    'curl ' + CFG.base + '/v1/chat/completions \\\n' +
    '  -H "Authorization: Bearer ' + (CFG.key && CFG.key.startsWith("dvk_") ? CFG.key : "dvk_ВАШ_КЛЮЧ") + '" \\\n' +
    '  -H "Content-Type: application/json" \\\n' +
    "  -d '{\"model\":\"" + model + "\",\"messages\":[{\"role\":\"user\",\"content\":\"привет\"}]}'";
  $("a-keynote").textContent = "";
  $("account").classList.add("on");
  loadCabinet();
}
async function loadCabinet() {
  const box = $("a-account");
  if (!CFG.key || !CFG.key.startsWith("dvk_")) {
    box.textContent = "Создайте или вставьте dvk_-ключ, чтобы увидеть баланс и расход."; return;
  }
  box.textContent = "Загрузка…";
  try {
    const me = await (await fetch(CFG.base + "/v1/keys/me", { headers: H() })).json();
    if (!me.address) { box.textContent = me.detail || "Ключ не распознан."; return; }
    const dvt = x => ((x || 0) / 1e6).toFixed(4) + " DVT";
    box.innerHTML =
      '<div class="kv"><span>Адрес</span><b style="font-size:11px">' + me.address + '</b></div>' +
      '<div class="kv"><span>Баланс</span><b>' + dvt(me.balance_udvt) + '</b></div>' +
      '<div class="kv"><span>Запросов</span><b>' + (me.requests || 0) + '</b></div>' +
      '<div class="kv"><span>Токенов</span><b>' + (me.tokens || 0) + '</b></div>' +
      '<div class="kv"><span>Потрачено (оц.)</span><b>' + dvt(me.spent_udvt_estimate) + '</b></div>' +
      '<div class="dimnote">Пополнить: <code>deltav send --to ' + me.address + ' --amount &lt;DVT&gt;</code></div>';
  } catch (e) { box.textContent = "Не удалось загрузить кабинет (проверьте Base URL и ключ)."; }
}
$("a-newkey").onclick = async () => {
  $("a-keynote").textContent = "Создаю ключ…";
  try {
    const r = await (await fetch(CFG.base + "/v1/keys", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ label: "web" }) })).json();
    if (r.api_key) {
      CFG.key = localStorage.dvKey = r.api_key;
      $("a-key").textContent = r.api_key;
      $("a-keynote").innerHTML = "✓ Ключ создан и сохранён в этом браузере. Пополните адрес <b style='font-size:11px'>" +
        r.address + "</b> — запросы оплачиваются с него on-chain.";
      openAccount.lastModel = null; loadCabinet();
    } else $("a-keynote").textContent = r.detail || "Не удалось создать ключ.";
  } catch (e) { $("a-keynote").textContent = "Ошибка создания ключа."; }
};
$("a-close").onclick = () => $("account").classList.remove("on");
$("acct").onclick = openAccount;

sendBtn.onclick = onSend;
input.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSend(); } });
input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 120) + "px"; });
$("reset").onclick = () => { messages = []; log.innerHTML = ""; };

loadModels();
el("msg bot", "ΔV на связи. Режимы сверху: чат, агент, сворм, компаньон. 🖼 — прикрепить картинку (vision). ⚙ — сменить сеть/ключ.");
</script>
</body>
</html>
